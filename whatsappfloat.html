<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="Callbutton.css">
</head>
<body>




<!-- CHAT BOX -->

<div class="wa-chat" id="waChat" style="display:none;">

<div class="wa-header">

<img
class="wa-avatar"
src="/LOGO.jpeg"
alt="SHA Infotechnology"
/>

<div>
<div class="wa-name">SHA Infotechnology</div>
<div class="wa-status">Online</div>
</div>

<div
class="wa-close"
onclick="closeWA()"
>
✕
</div>

</div>

<div class="wa-body">

<div class="wa-bubble">
Hi there 👋 <br>
How can we help you today?
</div>

</div>

<div class="wa-input">

<input
id="waInput"
type="text"
value="Hi SHA Infotechnology 👋 I would like to enquire about your services."
>

<div
class="wa-send"
onclick="sendWhatsApp()"
>
➤
</div>

</div>

</div>

<!-- FLOAT BUTTON -->

<div
class="wa-float"
onclick="toggleWA()"
>

<img
src="https://upload.wikimedia.org/wikipedia/commons/6/6b/WhatsApp.svg"
alt="WhatsApp"
>

</div>

<script>

/* PHONE */

const phone="919361046387";

/* AUTO OPEN 5 SEC */

setTimeout(()=>{
document.getElementById(
"waChat"
).style.display="block";
},5000);

/* TOGGLE */

function toggleWA(){

const chat=document.getElementById(
"waChat"
);

if(chat.style.display==="none"){
chat.style.display="block";
}
else{
chat.style.display="none";
}

}

/* CLOSE */

function closeWA(){
document.getElementById(
"waChat"
).style.display="none";
}

/* SEND */

function sendWhatsApp(){

const msg=document.getElementById(
"waInput"
).value;

const url=
"https://wa.me/"
+phone+
"?text="+
encodeURIComponent(msg);

window.open(
url,
"_blank"
);

}

/* ENTER KEY */

document.addEventListener(
"keydown",
function(e){

if(
e.key==="Enter" &&
document.activeElement.id==="waInput"
){
sendWhatsApp();
}

}
);

</script>
    
</body>
</html>
